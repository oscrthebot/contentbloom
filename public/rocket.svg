<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Rocket tip -->
  <rect x="7" y="0" width="2" height="1" fill="#16a34a"/>
  <!-- Row 1 -->
  <rect x="6" y="1" width="4" height="1" fill="#16a34a"/>
  <!-- Row 2 -->
  <rect x="5" y="2" width="6" height="1" fill="#16a34a"/>
  <!-- Row 3 body -->
  <rect x="5" y="3" width="6" height="1" fill="#16a34a"/>
  <!-- Row 4 body + window -->
  <rect x="5" y="4" width="6" height="1" fill="#16a34a"/>
  <rect x="6" y="4" width="4" height="1" fill="#bbf7d0"/>
  <!-- Row 5 body + window -->
  <rect x="5" y="5" width="6" height="1" fill="#16a34a"/>
  <rect x="6" y="5" width="4" height="1" fill="#bbf7d0"/>
  <!-- Row 6 fins + body -->
  <rect x="3" y="6" width="2" height="1" fill="#065f46"/>
  <rect x="5" y="6" width="6" height="1" fill="#15803d"/>
  <rect x="11" y="6" width="2" height="1" fill="#065f46"/>
  <!-- Row 7 fins + body -->
  <rect x="3" y="7" width="2" height="1" fill="#065f46"/>
  <rect x="5" y="7" width="6" height="1" fill="#15803d"/>
  <rect x="11" y="7" width="2" height="1" fill="#065f46"/>
  <!-- Row 8 fins narrow + body -->
  <rect x="4" y="8" width="1" height="1" fill="#065f46"/>
  <rect x="5" y="8" width="6" height="1" fill="#15803d"/>
  <rect x="11" y="8" width="1" height="1" fill="#065f46"/>
  <!-- Row 9 body only -->
  <rect x="5" y="9" width="6" height="1" fill="#15803d"/>
  <!-- Row 10 narrow -->
  <rect x="6" y="10" width="4" height="1" fill="#15803d"/>
  <!-- Flame outer -->
  <rect x="6" y="11" width="4" height="1" fill="#f97316"/>
  <!-- Flame middle -->
  <rect x="6" y="12" width="4" height="1" fill="#fb923c"/>
  <rect x="7" y="12" width="2" height="1" fill="#fbbf24"/>
  <!-- Flame tip -->
  <rect x="7" y="13" width="2" height="1" fill="#fef08a"/>
</svg>
